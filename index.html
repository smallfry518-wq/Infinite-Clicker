<!DOCTYPE html>
<html>
<head>
<title>Infinite Clicker X</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

body{
    margin:0;
    font-family:system-ui;
    background:radial-gradient(circle at top,#1e3a8a,#020617 60%,black);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* STOP MOBILE ZOOM / JITTER */
html,body{
    overscroll-behavior:none;
    touch-action:manipulation;
}

header{
    padding:14px;
    background:#0f172a;
    font-weight:800;
    position:sticky;
    top:0;
    z-index:10;
}

.card{
    margin:12px;
    padding:16px;
    background:#0f172a;
    border-radius:16px;
}

button{
    padding:12px 14px;
    margin:6px;
    border-radius:999px;
    border:0;
    cursor:pointer;
    font-size:16px;
    touch-action:manipulation;
}

.primary{background:#3b82f6;color:white;}
.green{background:#22c55e;color:white;}
.dark{background:#1f2937;color:white;}

#money{
    font-size:44px;
    font-weight:900;
}

.stats{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
}

.pill{
    background:#020617;
    padding:6px 10px;
    border-radius:999px;
    font-size:13px;
}

/* CLICK FX */
.pop{
    animation:pop .15s ease;
}

@keyframes pop{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

/* FLOATING TEXT */
.float{
    position:absolute;
    animation:floatUp 1s ease forwards;
    pointer-events:none;
    color:#22c55e;
    font-weight:800;
}

@keyframes floatUp{
    from{opacity:1; transform:translateY(0);}
    to{opacity:0; transform:translateY(-60px);}
}
</style>
</head>

<body>

<header>💰 Infinite Clicker X</header>

<div class="card" id="login">
    <h2>Login</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <br>
    <button class="primary" onclick="login()">Enter</button>
    <p id="msg"></p>
</div>

<div class="card" id="game" style="display:none;">

    <div id="money">$0</div>

    <div class="stats">
        <div class="pill">Click: <span id="cp">1</span></div>
        <div class="pill">Auto: <span id="ap">0</span></div>
        <div class="pill">Rebirth: <span id="rb">0</span></div>
        <div class="pill">Mult: x<span id="mul">1</span></div>
    </div>

    <hr>

    <button class="primary" id="clickBtn" onclick="clickMoney(event)">CLICK 💥</button>

    <hr>

    <button class="dark" onclick="buyClick()">Upgrade Click</button>
    <button class="dark" onclick="buyAuto()">Upgrade Auto</button>

    <hr>

    <button class="green" onclick="rebirth()">REBIRTH 🔁</button>

    <hr>

    <button class="dark" onclick="exportLB()">Export Leaderboard</button>
    <button class="dark" onclick="importLB()">Import Leaderboard</button>

    <p id="lb"></p>
</div>

<script>
// ===== STATE =====
let u="";
let money=0;
let cp=1;
let ap=0;
let rb=0;
let mult=1;

let clickLevel=0;
let autoLevel=0;

// ===== MOBILE FIX: PREVENT DOUBLE TAP ZOOM =====
document.addEventListener("touchstart",function(){},{passive:true});

// ===== LOGIN =====
function login(){
    const name=document.getElementById("u").value;
    const pass=document.getElementById("p").value;

    if(!name||!pass)return;

    u=name;

    let data=load(u);

    if(!data){
        save(u,{pass,money:0,cp:1,ap:0,rb:0,mult:1});
        msg("Created!");
    }else{
        if(data.pass!==pass)return msg("Wrong password");
        msg("Loaded");
    }

    data=load(u);

    money=data.money;
    cp=data.cp;
    ap=data.ap;
    rb=data.rb;
    mult=data.mult;

    show();
    update();
}

// ===== STORAGE =====
function key(x){return "cx_"+x;}
function save(x,d){localStorage.setItem(key(x),JSON.stringify(d));}
function load(x){return JSON.parse(localStorage.getItem(key(x))||"null");}

// ===== CLICK SYSTEM (FUN) =====
function clickMoney(e){
    let gain = cp * mult;

    // CRIT CHANCE
    if(Math.random()<0.1){
        gain*=5;
    }

    money+=gain;

    floatText(e.clientX,e.clientY,"+"+gain);

    animate();
    update();
}

// ===== FLOAT TEXT =====
function floatText(x,y,text){
    const el=document.createElement("div");
    el.className="float";
    el.innerText=text;
    el.style.left=x+"px";
    el.style.top=y+"px";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
}

// ===== UPGRADES =====
function buyClick(){
    let cost=Math.floor(10*Math.pow(1.35,clickLevel));
    if(money>=cost){
        money-=cost;
        cp++;
        clickLevel++;
    }
    update();
}

function buyAuto(){
    let cost=Math.floor(25*Math.pow(1.4,autoLevel));
    if(money>=cost){
        money-=cost;
        ap++;
        autoLevel++;
    }
    update();
}

// ===== REBIRTH SYSTEM =====
function rebirth(){
    if(money<5000)return;

    money=0;
    cp=1;
    ap=0;
    clickLevel=0;
    autoLevel=0;

    rb++;
    mult = 1 + rb*0.5;

    update();
}

// ===== AUTO =====
setInterval(()=>{
    money+=ap*mult;
    update();
},1000);

// ===== LEADERBOARD (LOCAL GLOBAL SIM) =====
function exportLB(){
    let lb = JSON.parse(localStorage.getItem("leaderboard")||"[]");

    lb.push({name:u,score:money});

    lb.sort((a,b)=>b.score-a.score);

    localStorage.setItem("leaderboard",JSON.stringify(lb.slice(0,20)));

    document.getElementById("lb").innerText="Exported!";
}

function importLB(){
    let lb = JSON.parse(localStorage.getItem("leaderboard")||"[]");

    let txt = lb.map((x,i)=>`#${i+1} ${x.name} - ${x.score}`).join("\n");

    document.getElementById("lb").innerText=txt;
}

// ===== UI =====
function update(){
    document.getElementById("money").innerText="$"+Math.floor(money);
    document.getElementById("cp").innerText=cp;
    document.getElementById("ap").innerText=ap;
    document.getElementById("rb").innerText=rb;
    document.getElementById("mul").innerText=mult.toFixed(1);

    autosave();
}

function autosave(){
    if(!u)return;
    save(u,{pass:load(u).pass,money,cp,ap,rb,mult});
}

function animate(){
    let b=document.getElementById("clickBtn");
    b.classList.add("pop");
    setTimeout(()=>b.classList.remove("pop"),150);
}

function show(){
    document.getElementById("login").style.display="none";
    document.getElementById("game").style.display="block";
}

function msg(t){
    document.getElementById("msg").innerText=t;
}
</script>

</body>
</html>
