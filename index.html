<!DOCTYPE html>
<html>
<head>
<title>Infinite Money Clicker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#020617;
    --card:#0f172a;
    --accent:#3b82f6;
    --accent2:#22c55e;
    --text:#e5e7eb;
}

body{
    margin:0;
    font-family:system-ui;
    background:radial-gradient(circle at top,#1d4ed8,#020617 60%,#000);
    color:var(--text);
    text-align:center;
}

header{
    padding:16px;
    font-size:24px;
    font-weight:800;
    background:rgba(15,23,42,.9);
    position:sticky;
    top:0;
}

.main{max-width:900px;margin:auto;padding:12px;}

.card{
    background:rgba(15,23,42,.92);
    padding:18px;
    margin:12px 0;
    border-radius:18px;
    border:1px solid rgba(148,163,184,.3);
    box-shadow:0 20px 40px rgba(0,0,0,.5);
}

#money{
    font-size:44px;
    font-weight:900;
}

.stats{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.pill{
    background:#020617;
    padding:8px 12px;
    border-radius:999px;
    border:1px solid #334155;
    font-size:13px;
}

button{
    padding:12px 16px;
    margin:6px;
    border-radius:999px;
    border:0;
    cursor:pointer;
    transition:.15s;
}

button:hover{transform:scale(1.05);}
.primary{background:var(--accent);color:white;}
.green{background:var(--accent2);color:white;}
.dark{background:#1f2937;color:white;}

input{
    width:90%;
    padding:10px;
    margin:6px;
    border-radius:10px;
    border:1px solid #334155;
    background:#020617;
    color:white;
}

/* CLICK FX */
.pop{
    animation:pop .15s ease;
}

@keyframes pop{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<header>💰 Infinite Clicker Platform</header>

<div class="main">

<!-- LOGIN -->
<div class="card" id="loginCard">
    <h2>Login System</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button class="primary" onclick="login()">Enter Game</button>

    <p id="msg"></p>
</div>

<!-- GAME -->
<div class="card" id="gameCard" style="display:none;">

    <div id="money">$0</div>

    <div class="stats">
        <div class="pill">Click: <span id="cp">1</span></div>
        <div class="pill">Auto: <span id="ap">0</span></div>
        <div class="pill">User: <span id="un">-</span></div>
    </div>

    <hr>

    <button class="primary" id="clickBtn" onclick="clickMoney()">CLICK</button>

    <hr>

    <h3>Upgrades</h3>

    <button class="dark" onclick="buyClick()">
        Upgrade Click<br>
        Cost: $<span id="cCost">10</span>
    </button>

    <button class="dark" onclick="buyAuto()">
        Upgrade Auto<br>
        Cost: $<span id="aCost">25</span>
    </button>

    <hr>

    <h3>Profile</h3>
    <button onclick="setAvatar('⚡')">Neon</button>
    <button onclick="setAvatar('🤖')">Robot</button>
    <button onclick="setAvatar('🛡️')">Knight</button>

    <hr>

    <button class="green" onclick="exportSave()">Export Save</button>
    <button class="dark" onclick="importSave()">Import Save</button>

    <p id="code"></p>
</div>

</div>

<script>
// ===== STATE =====
let user="";
let money=0;
let cp=1;
let ap=0;
let clickLevel=0;
let autoLevel=0;
let avatar="⚡";

// ===== LOGIN =====
function login(){
    const u = userInput();
    const p = passInput();

    if(!u || !p){
        msg("Fill all fields");
        return;
    }

    let data = load(u);

    if(!data){
        save(u,{pass:p,money:0,cp:1,ap:0,clickLevel:0,autoLevel:0,avatar:"⚡"});
        msg("Account created!");
    } else {
        if(data.pass!==p){
            msg("Wrong password");
            return;
        }
        msg("Loaded!");
    }

    user=u;
    data=load(user);

    money=data.money;
    cp=data.cp;
    ap=data.ap;
    clickLevel=data.clickLevel;
    autoLevel=data.autoLevel;
    avatar=data.avatar;

    show();
    update();
}

// ===== STORAGE =====
function key(u){return "clicker_"+u;}
function save(u,d){localStorage.setItem(key(u),JSON.stringify(d));}
function load(u){return JSON.parse(localStorage.getItem(key(u)));}

// ===== GAME =====
function clickMoney(){
    money+=cp;
    animate();
    update();
}

function buyClick(){
    let cost=Math.floor(10*Math.pow(1.3,clickLevel));

    if(money>=cost){
        money-=cost;
        cp++;
        clickLevel++;
        update();
    }
}

function buyAuto(){
    let cost=Math.floor(25*Math.pow(1.35,autoLevel));

    if(money>=cost){
        money-=cost;
        ap++;
        autoLevel++;
        update();
    }
}

setInterval(()=>{
    money+=ap;
    update();
},1000);

// ===== PROFILE =====
function setAvatar(a){avatar=a;update();}

// ===== SAVE CODE =====
function exportSave(){
    document.getElementById("code").innerText=
    btoa(JSON.stringify({money,cp,ap,clickLevel,autoLevel,avatar}));
}

function importSave(){
    let c=prompt("Paste code");
    if(!c)return;
    let d=JSON.parse(atob(c));

    money=d.money;
    cp=d.cp;
    ap=d.ap;
    clickLevel=d.clickLevel;
    autoLevel=d.autoLevel;
    avatar=d.avatar;

    update();
}

// ===== UI =====
function update(){
    document.getElementById("money").innerText="$"+money;
    document.getElementById("cp").innerText=cp;
    document.getElementById("ap").innerText=ap;
    document.getElementById("un").innerText=user;

    document.getElementById("cCost").innerText=
        Math.floor(10*Math.pow(1.3,clickLevel));

    document.getElementById("aCost").innerText=
        Math.floor(25*Math.pow(1.35,autoLevel));

    autosave();
}

function autosave(){
    if(!user)return;
    save(user,{pass:load(user).pass,money,cp,ap,clickLevel,autoLevel,avatar});
}

function animate(){
    let b=document.getElementById("clickBtn");
    b.classList.add("pop");
    setTimeout(()=>b.classList.remove("pop"),150);
}

function show(){
    document.getElementById("loginCard").style.display="none";
    document.getElementById("gameCard").style.display="block";
}

function msg(t){document.getElementById("msg").innerText=t;}
function userInput(){return document.getElementById("user").value;}
function passInput(){return document.getElementById("pass").value;}
</script>

</body>
</html>
