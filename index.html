<!DOCTYPE html>
<html>
<head>
<title>Infinite Clicker X (FIXED FINAL)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

html,body{
    margin:0;
    font-family:system-ui;
    background:radial-gradient(circle at top,#1e3a8a,#020617 70%,black);
    color:white;
    text-align:center;
    overscroll-behavior:none;
}

header{
    padding:14px;
    background:#0f172a;
    font-weight:900;
}

.main{max-width:900px;margin:auto;padding:12px;}

.card{
    background:#0f172a;
    padding:16px;
    margin:12px 0;
    border-radius:16px;
    border:1px solid #334155;
}

#money{
    font-size:44px;
    font-weight:900;
}

.stats{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
}

.pill{
    background:#020617;
    padding:6px 10px;
    border-radius:999px;
    font-size:13px;
}

button{
    padding:12px 14px;
    margin:6px;
    border-radius:999px;
    border:0;
    cursor:pointer;
    font-size:15px;
    touch-action:manipulation;
}

.primary{background:#3b82f6;color:white;}
.green{background:#22c55e;color:white;}
.dark{background:#1f2937;color:white;}

.shop-grid{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

.shop-item{
    width:240px;
    background:#020617;
    border:1px solid #334155;
    border-radius:14px;
    padding:12px;
}

.small{font-size:13px;color:#94a3b8;}

.pop{animation:pop .15s ease;}
@keyframes pop{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<header>💰 Infinite Clicker X (CLEAN FIX)</header>

<div class="main">

<!-- LOGIN -->
<div class="card" id="loginCard">
    <h2>Login</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <br>
    <button class="primary" onclick="login()">Enter Game</button>
    <p id="msg"></p>
</div>

<!-- GAME -->
<div id="game" style="display:none;">

<div class="card">
    <div id="money">$0</div>

    <div class="stats">
        <div class="pill">Click: <span id="cp">1</span></div>
        <div class="pill">Auto: <span id="ap">0</span></div>
        <div class="pill">Rebirth: <span id="rb">0</span></div>
        <div class="pill">Mult: x<span id="mul">1</span></div>
    </div>

    <button class="primary" id="clickBtn" onclick="clickMoney(event)">CLICK 💥</button>
</div>

<!-- SHOP -->
<div class="card">
    <h2>🛒 Shop</h2>

    <div class="shop-grid">

        <div class="shop-item">
            <div><b>Click Upgrade</b></div>
            <div class="small">Boost click power</div>
            <div>Cost: $<span id="cCost">10</span></div>
            <button class="dark" onclick="buyClick()">Buy</button>
        </div>

        <div class="shop-item">
            <div><b>Auto Upgrade</b></div>
            <div class="small">Passive income</div>
            <div>Cost: $<span id="aCost">25</span></div>
            <button class="dark" onclick="buyAuto()">Buy</button>
        </div>

        <div class="shop-item">
            <div><b>Rebirth</b></div>
            <div class="small">+0.5x multiplier per rebirth</div>
            <div>Need: $5000</div>
            <button class="green" onclick="rebirth()">REBIRTH</button>
        </div>

    </div>
</div>

<!-- LEADERBOARD -->
<div class="card">
    <h2>🏆 Leaderboard</h2>
    <button class="dark" onclick="refreshLB()">Refresh</button>
    <div id="lb"></div>
</div>

</div>

</div>

<script>

// ================= STATE =================
let u="";
let money=0;
let cp=1;
let ap=0;

let rb=0;

let clickLevel=0;
let autoLevel=0;

// ================= LOGIN =================
function login(){
    let name=document.getElementById("u").value;
    let pass=document.getElementById("p").value;

    if(!name||!pass)return;

    u=name;

    let data=load(u);

    if(!data){
        save(u,{pass,money:0,cp:1,ap:0,rb:0,clickLevel:0,autoLevel:0});
        msg("Created!");
    }else{
        if(data.pass!==pass)return msg("Wrong password");
        msg("Loaded!");
    }

    data=load(u);

    money=data.money;
    cp=data.cp;
    ap=data.ap;
    rb=data.rb;
    clickLevel=data.clickLevel;
    autoLevel=data.autoLevel;

    show();
    update();
}

// ================= STORAGE =================
function key(x){return "cx_"+x;}
function save(x,d){localStorage.setItem(key(x),JSON.stringify(d));}
function load(x){return JSON.parse(localStorage.getItem(key(x))||"null");}

// ================= MULTIPLIER (FIXED CORE) =================
function getMult(){
    return 1 + (rb * 0.5);
}

// ================= CLICK =================
function clickMoney(e){
    let gain = cp * getMult();

    if(Math.random()<0.1) gain *= 5;

    money += gain;

    animate();
    update();
}

// ================= SHOP =================
function buyClick(){
    let cost=Math.floor(10*Math.pow(1.35,clickLevel));

    if(money>=cost){
        money-=cost;
        cp++;
        clickLevel++;
    }

    update();
}

function buyAuto(){
    let cost=Math.floor(25*Math.pow(1.4,autoLevel));

    if(money>=cost){
        money-=cost;
        ap++;
        autoLevel++;
    }

    update();
}

// ================= REBIRTH =================
function rebirth(){
    if(money<5000)return;

    money=0;
    cp=1;
    ap=0;
    clickLevel=0;
    autoLevel=0;

    rb++;

    update();
}

// ================= AUTO =================
setInterval(()=>{
    money += ap * getMult();
    update();
},1000);

// ================= LEADERBOARD =================
function refreshLB(){
    let lb=JSON.parse(localStorage.getItem("lb")||"[]");

    lb.push({name:u,score:money});

    lb.sort((a,b)=>b.score-a.score);

    lb=lb.slice(0,10);

    localStorage.setItem("lb",JSON.stringify(lb));

    document.getElementById("lb").innerHTML =
    lb.map((x,i)=>`#${i+1} ${x.name} - $${Math.floor(x.score)}`).join("<br>");
}

// ================= UI =================
function update(){
    document.getElementById("money").innerText="$"+Math.floor(money);
    document.getElementById("cp").innerText=cp;
    document.getElementById("ap").innerText=ap;
    document.getElementById("rb").innerText=rb;
    document.getElementById("mul").innerText=getMult().toFixed(2);

    document.getElementById("cCost").innerText=
        Math.floor(10*Math.pow(1.35,clickLevel));

    document.getElementById("aCost").innerText=
        Math.floor(25*Math.pow(1.4,autoLevel));

    autosave();
}

function autosave(){
    if(!u)return;

    save(u,{
        pass:load(u).pass,
        money,cp,ap,rb,clickLevel,autoLevel
    });
}

function animate(){
    let b=document.getElementById("clickBtn");
    b.classList.add("pop");
    setTimeout(()=>b.classList.remove("pop"),150);
}

function show(){
    document.getElementById("loginCard").style.display="none";
    document.getElementById("game").style.display="block";
}

function msg(t){
    document.getElementById("msg").innerText=t;
}

</script>

</body>
</html>
