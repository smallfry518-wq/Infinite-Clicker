<!DOCTYPE html>
<html>
<head>
<title>Infinite Money Clicker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
    --bg:#020617;
    --card:#0f172a;
    --accent:#3b82f6;
    --accent2:#22c55e;
    --text:#e5e7eb;
    --muted:#9ca3af;
}

*{
    box-sizing:border-box;
}

body{
    background:radial-gradient(circle at top,#1d4ed8 0,#020617 45%,#000 100%);
    color:var(--text);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    margin:0;
    padding:0;
    text-align:center;
}

header{
    padding:18px 12px;
    font-size:26px;
    font-weight:700;
    letter-spacing:.04em;
    backdrop-filter:blur(10px);
    background:rgba(15,23,42,.85);
    box-shadow:0 10px 30px rgba(0,0,0,.6);
    position:sticky;
    top:0;
    z-index:10;
}

.main{
    max-width:900px;
    margin:20px auto 40px;
    padding:0 12px;
}

.card{
    background:rgba(15,23,42,.92);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 18px 40px rgba(0,0,0,.7);
    border:1px solid rgba(148,163,184,.35);
}

.card-title{
    font-size:20px;
    font-weight:600;
    margin-bottom:8px;
}

input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(148,163,184,.6);
    background:#020617;
    color:var(--text);
    font-size:16px;
    margin-top:8px;
}

input:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 1px rgba(59,130,246,.6);
}

button{
    padding:12px 16px;
    margin:8px 4px;
    font-size:16px;
    border-radius:999px;
    border:0;
    cursor:pointer;
    background:var(--accent);
    color:white;
    min-width:140px;
    transition:transform .12s,box-shadow .12s,background .12s;
}

button.primary{
    background:var(--accent);
}

button.secondary{
    background:#1f2937;
}

button.success{
    background:var(--accent2);
}

button:hover{
    transform:translateY(-1px) scale(1.03);
    box-shadow:0 10px 25px rgba(15,23,42,.8);
}

button:active{
    transform:scale(.98);
    box-shadow:none;
}

#money{
    font-size:40px;
    font-weight:800;
}

.stats-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    margin-top:10px;
}

.stat-pill{
    background:#020617;
    border-radius:999px;
    padding:8px 14px;
    font-size:14px;
    border:1px solid rgba(148,163,184,.5);
}

hr{
    border:0;
    height:1px;
    background:rgba(51,65,85,.9);
    margin:18px 0;
}

.leaderboard-list{
    text-align:left;
    max-height:260px;
    overflow-y:auto;
    margin-top:10px;
    font-size:14px;
}

.leaderboard-item{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid rgba(30,64,175,.35);
}

.leaderboard-rank{
    color:var(--muted);
    margin-right:8px;
}

.leaderboard-name{
    font-weight:600;
}

.leaderboard-score{
    color:var(--accent2);
}

.small{
    font-size:13px;
    color:var(--muted);
}

@media (max-width:600px){
    #money{
        font-size:32px;
    }
    button{
        width:100%;
        max-width:none;
    }
}
</style>
</head>

<body>

<header>💰 Infinite Money Clicker</header>

<div class="main">

    <!-- LOGIN / ACCOUNT CARD -->
    <div class="card" id="authCard">
        <div class="card-title">Account Login</div>
        <div class="small">Accounts + leaderboards are global when you connect this to a backend API.</div>

        <input id="usernameInput" placeholder="Username">
        <input id="passwordInput" type="password" placeholder="Password">

        <button class="primary" onclick="login(true)">Sign Up</button>
        <button class="secondary" onclick="login(false)">Log In</button>

        <div id="authStatus" class="small" style="margin-top:8px;"></div>
    </div>

    <!-- GAME CARD -->
    <div class="card" id="gameCard" style="display:none;">
        <div class="card-title">Your Balance</div>
        <h1>$<span id="money">0</span></h1>

        <div class="stats-row">
            <div class="stat-pill">Per Click: <span id="clickPower">1</span></div>
            <div class="stat-pill">Per Second: <span id="autoPower">0</span></div>
            <div class="stat-pill">User: <span id="currentUser">-</span></div>
        </div>

        <hr>

        <button class="primary" onclick="clickMoney()">CLICK FOR MONEY</button>

        <hr>

        <div class="card-title">Upgrades</div>
        <button class="secondary" onclick="upgradeClick()">
            Upgrade Click<br>
            Cost: $<span id="clickCost">10</span>
        </button>

        <button class="secondary" onclick="upgradeAuto()">
            Upgrade Auto<br>
            Cost: $<span id="autoCost">50</span>
        </button>

        <hr>

        <button class="success" onclick="saveGame()">Save to Cloud</button>
        <div class="small" id="saveStatus"></div>
    </div>

    <!-- LEADERBOARD CARD -->
    <div class="card" id="leaderboardCard" style="display:none;">
        <div class="card-title">Global Leaderboard</div>
        <div class="small">Top players by total money (requires backend API).</div>

        <button class="secondary" onclick="fetchLeaderboard()">Refresh Leaderboard</button>

        <div class="leaderboard-list" id="leaderboardList">
            <!-- Filled by JS -->
        </div>
    </div>

</div>

<script>
// ===== GAME STATE =====
let username = "";
let password = "";
let money = 0;
let clickPower = 1;
let autoPower = 0;
let clickLevel = 0;
let autoLevel = 0;

// ===== BIG NUMBER FORMATTER =====
function formatBig(num){
    const units = [
        { value: 1e15, suffix: "Q" },      // quadrillion
        { value: 1e12, suffix: "T" },      // trillion
        { value: 1e9,  suffix: "B" },      // billion
        { value: 1e6,  suffix: "M" },      // million
        { value: 1e3,  suffix: "K" }       // thousand
    ];

    for(const u of units){
        if(num >= u.value){
            return (num / u.value).toFixed(2) + u.suffix;
        }
    }
    return Math.floor(num);
}

// ===== AUTH / ACCOUNTS =====
// NOTE: These functions assume you have a backend API.
// Replace URLs with your real endpoints.

async function login(isSignup){
    username = document.getElementById("usernameInput").value.trim();
    password = document.getElementById("passwordInput").value;

    const statusEl = document.getElementById("authStatus");

    if(!username || !password){
        statusEl.textContent = "Enter both username and password.";
        return;
    }

    statusEl.textContent = "Contacting server...";

    try{
        // Example payload
        const payload = { username, password };

        // Placeholder URL – you must implement this on your server
        const url = isSignup ? "/api/signup" : "/api/login";

        // If you don't have a backend yet, comment out fetch and just call localLoad()
        const res = await fetch(url,{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify(payload)
        });

        if(!res.ok){
            statusEl.textContent = "Server error / invalid credentials.";
            return;
        }

        const data = await res.json();

        // Expect backend to return user game state or null
        if(data && data.state){
            money       = data.state.money       ?? 0;
            clickPower  = data.state.clickPower  ?? 1;
            autoPower   = data.state.autoPower   ?? 0;
            clickLevel  = data.state.clickLevel  ?? 0;
            autoLevel   = data.state.autoLevel   ?? 0;
        }else{
            // New account default
            money = 0;
            clickPower = 1;
            autoPower = 0;
            clickLevel = 0;
            autoLevel = 0;
        }

        statusEl.textContent = isSignup ? "Account created!" : "Logged in!";
        document.getElementById("authCard").style.display = "none";
        document.getElementById("gameCard").style.display = "block";
        document.getElementById("leaderboardCard").style.display = "block";
        document.getElementById("currentUser").textContent = username;

        update();
        fetchLeaderboard(); // load leaderboard after login

    }catch(e){
        // Fallback: local-only mode if server not available
        statusEl.textContent = "Server unreachable. Running in local mode.";
        localLoad();
        document.getElementById("authCard").style.display = "none";
        document.getElementById("gameCard").style.display = "block";
        document.getElementById("leaderboardCard").style.display = "block";
        document.getElementById("currentUser").textContent = username;
        update();
    }
}

// ===== LOCAL SAVE (fallback) =====
function localKey(){
    return "clicker_"+username;
}

function localSave(){
    const data = {
        money,
        clickPower,
        autoPower,
        clickLevel,
        autoLevel
    };
    localStorage.setItem(localKey(), JSON.stringify(data));
}

function localLoad(){
    const raw = localStorage.getItem(localKey());
    if(!raw) return;
    const data = JSON.parse(raw);
    money       = data.money       ?? 0;
    clickPower  = data.clickPower  ?? 1;
    autoPower   = data.autoPower   ?? 0;
    clickLevel  = data.clickLevel  ?? 0;
    autoLevel   = data.autoLevel   ?? 0;
}

// ===== SAVE TO CLOUD / LEADERBOARD =====
async function saveGame(){
    const saveStatus = document.getElementById("saveStatus");
    saveStatus.textContent = "Saving...";

    const payload = {
        username,
        password,
        state:{
            money,
            clickPower,
            autoPower,
            clickLevel,
            autoLevel
        }
    };

    try{
        const res = await fetch("/api/save",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify(payload)
        });

        if(!res.ok){
            saveStatus.textContent = "Cloud save failed (server error).";
            localSave();
            return;
        }

        saveStatus.textContent = "Saved to cloud!";
    }catch(e){
        saveStatus.textContent = "Cloud unreachable. Saved locally.";
        localSave();
    }
}

async function fetchLeaderboard(){
    const listEl = document.getElementById("leaderboardList");
    listEl.innerHTML = "Loading leaderboard...";

    try{
        const res = await fetch("/api/leaderboard");
        if(!res.ok){
            listEl.innerHTML = "Failed to load leaderboard.";
            return;
        }

        const data = await res.json();
        // Expect: data = [{ username, money }, ...]
        listEl.innerHTML = "";

        (data || []).slice(0,50).forEach((entry,idx)=>{
            const row = document.createElement("div");
            row.className = "leaderboard-item";

            const left = document.createElement("div");
            left.innerHTML = `<span class="leaderboard-rank">#${idx+1}</span><span class="leaderboard-name">${entry.username}</span>`;

            const right = document.createElement("div");
            right.className = "leaderboard-score";
            right.textContent = "$"+formatBig(entry.money || 0);

            row.appendChild(left);
            row.appendChild(right);
            listEl.appendChild(row);
        });

        if(!listEl.innerHTML){
            listEl.innerHTML = "<span class='small'>No entries yet.</span>";
        }

    }catch(e){
        listEl.innerHTML = "Leaderboard server unreachable.";
    }
}

// ===== GAME LOGIC =====
function clickMoney(){
    money += clickPower;
    update();
}

function upgradeClick(){
    let cost = Math.floor(10 * Math.pow(1.25, clickLevel));
    if(money >= cost){
        money -= cost;
        clickPower += Math.floor(clickPower * 0.5) + 1;
        clickLevel++;
        update();
    }
}

function upgradeAuto(){
    let cost = Math.floor(50 * Math.pow(1.5, autoLevel));
    if(money >= cost){
        money -= cost;
        autoPower += 1;
        autoLevel++;
        update();
    }
}

setInterval(()=>{
    money += autoPower;
    update();
},1000);

function update(){
    document.getElementById("money").textContent      = formatBig(money);
    document.getElementById("clickPower").textContent = formatBig(clickPower);
    document.getElementById("autoPower").textContent  = formatBig(autoPower);
    document.getElementById("clickCost").textContent  =
        formatBig(Math.floor(10 * Math.pow(1.25, clickLevel)));
    document.getElementById("autoCost").textContent   =
        formatBig(Math.floor(50 * Math.pow(1.5, autoLevel)));

    // Always keep a local backup
    if(username){
        localSave();
    }
}
</script>

</body>
</html>
