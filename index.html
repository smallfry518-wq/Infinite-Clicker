<!DOCTYPE html>
<html>
<head>
<title>Infinite Money Clicker - Global</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:system-ui;
    background:radial-gradient(circle,#0f172a,#000);
    color:white;
    text-align:center;
}

header{
    padding:16px;
    font-size:24px;
    background:#111827;
    position:sticky;
    top:0;
}

.card{
    background:#111827;
    margin:12px;
    padding:16px;
    border-radius:16px;
}

button{
    padding:10px 14px;
    margin:6px;
    border-radius:999px;
    border:0;
    cursor:pointer;
}

.primary{background:#3b82f6;color:white;}
.success{background:#22c55e;}
.dark{background:#1f2937;color:white;}

#money{font-size:42px;font-weight:800;}
.avatar{
    width:80px;height:80px;
    border-radius:20px;
    margin:auto;
    background:#3b82f6;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
}
</style>
</head>

<body>

<header>💰 GLOBAL INFINITE CLICKER</header>

<div class="card" id="auth">
    <h2>Login / Sign Up</h2>
    <input id="email" placeholder="Email"><br><br>
    <input id="pass" type="password" placeholder="Password"><br><br>

    <button class="primary" onclick="signup()">Sign Up</button>
    <button class="dark" onclick="login()">Login</button>
</div>

<div class="card" id="game" style="display:none;">
    <div class="avatar" id="avatar">⚡</div>

    <h1 id="money">$0</h1>

    <button class="primary" onclick="clickMoney()">CLICK + MONEY</button>

    <br>

    <button class="success" onclick="save()">SAVE CLOUD</button>

    <h3>Character</h3>
    <button onclick="setAvatar('⚡')">Neon</button>
    <button onclick="setAvatar('🤖')">Robot</button>
    <button onclick="setAvatar('🛡️')">Knight</button>
    <button onclick="setAvatar('👾')">Alien</button>

    <br><br>

    <button class="dark" onclick="prestige()">PRESTIGE (x2 gain)</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 PUT YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let money = 0;
let multiplier = 1;
let avatar = "⚡";

/* LOGIN */
window.signup = async () => {
    const email = emailEl().value;
    const pass = passEl().value;

    await createUserWithEmailAndPassword(auth, email, pass);
};

window.login = async () => {
    const email = emailEl().value;
    const pass = passEl().value;

    await signInWithEmailAndPassword(auth, email, pass);
};

/* AUTH STATE */
onAuthStateChanged(auth, async (u) => {
    if(u){
        user = u;
        document.getElementById("auth").style.display="none";
        document.getElementById("game").style.display="block";
        await loadData();
    }
});

/* LOAD / SAVE CLOUD */
async function loadData(){
    const ref = doc(db,"players",user.uid);
    const snap = await getDoc(ref);

    if(snap.exists()){
        const d = snap.data();
        money = d.money || 0;
        multiplier = d.multiplier || 1;
        avatar = d.avatar || "⚡";
    }

    update();
}

window.save = async () => {
    const ref = doc(db,"players",user.uid);
    await setDoc(ref,{
        money,
        multiplier,
        avatar
    });
};

/* GAME */
window.clickMoney = () => {
    money += 1 * multiplier;
    update();
};

window.setAvatar = (a) => {
    avatar = a;
    document.getElementById("avatar").textContent = a;
};

window.prestige = () => {
    if(money >= 1000){
        money = 0;
        multiplier *= 2;
        update();
    }
};

function update(){
    document.getElementById("money").textContent = "$"+money;
    document.getElementById("avatar").textContent = avatar;
}

function emailEl(){ return document.getElementById("email"); }
function passEl(){ return document.getElementById("pass"); }

</script>

</body>
</html>
